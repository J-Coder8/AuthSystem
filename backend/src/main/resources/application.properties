spring.application.name=authsystem

# H2 Database (file-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/authsystem;IFEXISTS=FALSE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true

# Server port (avoid 8080 conflicts)
server.port=${PORT:8082}

# Compiler release flag to avoid JDK 17 module warnings
maven.compiler.release=17

# Email configuration (use a Gmail App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${AUTH_GMAIL_USER:}
spring.mail.password=${AUTH_GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT secret
jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-here-make-it-long}
jwt.expiration=86400000
jwt.temp-expiration=300000

# Debug helpers (do not use in production)
auth.debug.print-totp=true
auth.debug.print-otp=true
auth.debug.force-email-otp=false

# Logging
logging.level.com.authsystem=DEBUG
logging.level.org.springframework.security=DEBUG

# Optional external face recognition service (Python)
face.service.url=
